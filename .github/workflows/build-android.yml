name: Build PlayBoxTV APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Android/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (unsigned)
      working-directory: Android
      run: gradle assembleRelease --no-daemon

    - name: Rename APK
      working-directory: Android
      run: mv app/build/outputs/apk/release/app-release-unsigned.apk PlayBoxTV.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: PlayBoxTV-APK
        path: Android/PlayBoxTV.apk
        retention-days: 90

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-v1.0-${{ steps.date.outputs.date }}
        name: "PlayBox TV Android v1.0 (${{ steps.date.outputs.date }})"
        body: |
          ## PlayBox TV - Android App
          
          📱 Pobierz plik `.apk` poniżej i zainstaluj na urządzeniu z Androidem, w tym Android TV.
          UWAGA: Aby zainstalować system poprosi o zezwolenie na "Nieznane źródła".
          
          ### Linki w aplikacji:
          - 🔗 Główny: `https://stare.playboxtv.pl.eu.org/app`
          - 🔄 Fallback 1: `https://tv.yadasiopl.pl.eu.org/app`
          - 🔄 Fallback 2: `https://pbtv.netlify.app/app`
        files: Android/PlayBoxTV.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
